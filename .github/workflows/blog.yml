name: Build & Deploy Blog

on:
  push:
    branches: [main]
    paths:
      - 'blog-src/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: blog-src/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: blog-src

      - name: Build Docusaurus
        run: npm run build
        working-directory: blog-src

      - name: Deploy to blog/ directory
        run: |
          rm -rf blog
          cp -r blog-src/build blog

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/
          git diff --staged --quiet || git commit -m "build: update blog [skip ci]"
          git push
