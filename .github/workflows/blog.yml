name: Build & Deploy Blog

on:
  push:
    branches: [main]
    paths:
      - 'blog-src/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: blog-src

      - name: Cache Docusaurus build
        uses: docuactions/cache@v1
        with:
          working-directory: blog-src

      - name: Generate posts data
        run: npm run generate-posts
        working-directory: blog-src

      - name: Fetch GA4 ranking
        run: npm run fetch-ranking
        working-directory: blog-src
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_CREDENTIALS: ${{ secrets.GA4_CREDENTIALS }}

      - name: Build Docusaurus
        run: npm run build
        working-directory: blog-src

      - name: Deploy to blog/ directory
        run: |
          rm -rf blog
          cp -r blog-src/build blog

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          git add blog/ blog-src/static/ga-ranking.json
          git diff --staged --quiet || git commit -m "build: update blog [skip ci]"
          git push --force-with-lease origin HEAD:main
